<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Simple Webpage</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 40px;
            text-align: center;
        }
        h1{
            color: #2c7a7b;
        }
        p{
            font-size: 18px;
            color: #333;
        }
        img{
            width: 250px;
            margin: 20px;
        }
        a{
            color: #1a73e8;
            text-decoration: none;
            font-weight: bold;
        }
        button{
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2c7a7b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover{
            background-color: #205c5d;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Webpage</h1>
    <p>This is a simple webpage created using HTML, CSS, and JavaScript.</p>
    <img src="C:\task1\images\html.jpg" alt="Sample Image">
    <p>Visit <a href="https://www.google.com" target="_blank">Google</a></p>
    <button onclick="showMessage()">Click Me</button>
    <script>
        function showMessage(){
            alert("Hello! You clicked the button.");
        }
    </script>
</body>
</html>
